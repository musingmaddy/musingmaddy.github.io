baseURL: "https://musingmaddy.github.io"
languageCode: "en"
defaultContentLanguage: "en"
title: "MusingMaddy"
theme: "hugo-narrow"

# Project Specifics from hugo.toml
enableRobotsTXT: true

# Services
services:
  googleAnalytics:
    ID: "G-NV1GRD4KN5"

# Menus (Adapted from theme example + user content)
menus:
  main:
    - identifier: nav.posts
      name: Posts
      pageRef: /posts
      weight: 10
      params:
        icon: posts
    - identifier: nav.projects
      name: Projects
      pageRef: /projects
      weight: 20
      params:
        icon: projects
    - identifier: nav.about
      name: About
      pageRef: /about
      weight: 30
      params:
        icon: about
  footer:
    - name: Interests
      pageRef: /about/interests
      weight: 10
      params:
        icon: about
    - name: Contact Me
      pageRef: /about/contact_me
      weight: 20
      params:
        icon: email

# Params (Merged)
params:
  description: "🦢 Maddy's Arts, Crafts & Perspectives."
  author:
    name: "Maddy Meraki"
    title: "Musing Maddy"
    description: "🌺 Inspiring New Perspectives"
    avatar: "img/musingmaddy.webp"
    social: [] 
  
  # Theme Specific Params (from exampleSite/params.yaml)
  header:
    sticky: true
    showThemeSwitch: true
    showDarkModeSwitch: true
    showLanguageSwitch: false 
  
  dock: "scroll"
  contentWidth: "56rem"
  
  colorScheme: "default"
  themes:
    default:
        name: "Default"
        order: 1
    claude:
        name: "Claude"
        order: 2
    bumblebee:
        name: "Bumblebee"
        order: 3
    emerald:
        name: "Emerald"
        order: 4
    nord:
        name: "Nord"
        order: 5
    sunset:
        name: "Sunset"
        order: 6
    abyss:
        name: "Abyss"
        order: 7
    dracula:
        name: "Dracula"
        order: 8
    amethyst:
        name: "Amethyst"
        order: 9
    slate:
        name: "Slate"
        order: 10
    twitter:
        name: "Twitter"
        order: 11
  
  home:
    recentPostsCount: 5
    contentOrder:
      - author-section
      - page-content
      - recent-posts
      - featured-projects.html

  # Code block settings
  codeblock:
    collapse:
      enabled: true
      defaultState: "expanded"
  
  # Reading progress
  readingProgress:
    enabled: true
    height: 3
    
  # KaTeX
  katex:
    enabled: true
    delimiters:
      - left: "$$"
        right: "$$"
        display: true
      - left: "$"
        right: "$"
        display: false
      - left: "\\("
        right: "\\)"
        display: false
      - left: "\\["
        right: "\\]"
        display: true
