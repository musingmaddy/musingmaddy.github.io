# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["post"]
# Output page's full content in RSS.
rssFullContent = true
favicon = "/favicon.png"

[footer]
since = 2024
customText = "MusingMaddy 2024"

[dateFormat]
published = "Jan 02, 2006"
lastUpdated = "Jan 02, 2006 15:04 MST"

[sidebar]
enabled = false
emoji = "🌀"
subtitle = "Maddy's Musings about everything."

[sidebar.avatar]
enabled = true
local = true
src = "img/avatar.jpg"

[article]
math = false
readingTime = true

[article.license]
enabled = false
default = "Licensed under CC BY-NC-SA 4.0"

## Widgets
[[widgets.homepage]]
type = "search"

[[widgets.homepage]]
type = "archives"

[widgets.homepage.params]
limit = 5

[[widgets.homepage]]
type = "categories"

[widgets.homepage.params]
limit = 10

[[widgets.homepage]]
type = "tag-cloud"

[widgets.homepage.params]
limit = 10

[[widgets.page]]
type = "toc"

[opengraph.twitter]
site = "@musingmaddy"
card = "summary_large_image"

[defaultImage.opengraph]
enabled = true
local = false
src = "https://musingmaddy.github.io/img/avatar_hu90da647c4bf84732dd09ba7ed457fcd3_22691_300x0_resize_q75_box.jpg"

[colorScheme]
toggle = true
default = "light"

[imageProcessing.cover]
enabled = true

[imageProcessing.content]
enabled = true

